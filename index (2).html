<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Judy Yoo & Manuel Diaz-Granados — Save the Date</title>
<link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #f5ede4; --red: #A3362C; }

  * { cursor: none !important; }
  #dog-cursor {
    position: fixed; width: 56px; height: 56px;
    pointer-events: none; z-index: 9999;
    transform: translate(-8px, -8px);
    will-change: left, top;
    opacity: 0;
  }
  #dog-cursor img { width: 100%; height: 100%; display: block; }

  /* Hide dog cursor and restore default cursor on touch/mobile */
  @media (hover: none), (pointer: coarse) {
    #dog-cursor { display: none !important; }
    * { cursor: auto !important; }
  }

  body { background: var(--cream); min-height: 100vh; font-family: "Cormorant Garamond", serif; overflow: hidden; }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(163,54,44,0.05) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(163,54,44,0.04) 0%, transparent 55%),
      var(--cream);
  }

  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    transition: opacity 0.6s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── LANGUAGE SCREEN ── */
  .lang-names {
    font-family: "GFS Didot", "Didot", "Bodoni MT", serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: var(--red);
    text-align: center;
    line-height: 1.25;
    margin-bottom: 40px;
    letter-spacing: 0.02em;
  }
  .lang-amp {
    display: block;
    font-size: clamp(1.2rem, 4vw, 2rem);
    color: var(--red); opacity: 0.6;
    font-style: italic; font-weight: 400;
  }
  .lang-label {
    font-style: italic; font-size: 1rem;
    color: var(--red); opacity: 0.65;
    margin-bottom: 24px; text-align: center;
    letter-spacing: 0.05em;
  }
  .lang-buttons { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; padding: 0 24px; }
  .lang-btn {
    background: var(--cream); border: 1.5px solid #A3362C; color: #A3362C;
    width: 140px; height: 52px;
    font-family: "Cormorant Garamond", serif; font-size: 1.05rem;
    cursor: none; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
    letter-spacing: 0.04em; flex-shrink: 0;
  }
  .lang-btn:hover { background: #A3362C; color: white; box-shadow: 0 6px 20px rgba(163,54,44,.22); }

  /* ── INVITE SCREEN ── */
  #invite-screen {
    justify-content: center;
    align-items: center;
    /* reserve space for bottom bar, pad sides */
    padding: 16px 16px 120px;
    overflow-y: auto;
    /* ensure screen never exceeds viewport */
    height: 100%;
  }

  .invite-wrap {
    /* Width: never wider than 92vw; on desktop cap at 480px
       Height: card is portrait ~4:3 ratio; never taller than available space */
    width: min(576px, 92vw);
    /* Constrain height so it fits on small screens without scrolling */
    max-height: calc(100vh - 140px);
    opacity: 0;
    transform: translateY(-80px);
    transition: opacity 1.4s ease, transform 1.4s cubic-bezier(.22, 1, .36, 1);
    box-shadow: 0 16px 48px rgba(163,54,44,.22);
    border-radius: 4px;
    overflow: hidden;
    /* flex-shrink so it compresses on tiny screens */
    flex-shrink: 0;
  }
  .invite-wrap.visible { opacity: 1; transform: translateY(0); }
  .invite-wrap img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }

  /* Tablet: a touch smaller to keep breathing room */
  @media (max-width: 768px) {
    .invite-wrap {
      width: min(504px, 90vw);
      max-height: calc(100vh - 130px);
    }
  }

  /* Mobile: fill width, strict height cap */
  @media (max-width: 480px) {
    #invite-screen { padding: 12px 12px 110px; }
    .invite-wrap {
      width: 94vw;
      max-height: calc(100vh - 120px);
    }
  }

  /* Very short screens (landscape mobile) */
  @media (max-height: 600px) {
    .invite-wrap { max-height: calc(100vh - 100px); }
    #invite-screen { padding: 8px 16px 100px; }
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 14px 20px 28px;
    background: linear-gradient(to top, rgba(245,237,228,1) 0%, rgba(245,237,228,.97) 65%, transparent 100%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }

  /* ── CALENDAR DROPDOWN ── */
  .cal-dropdown { position: relative; display: inline-block; }

  .cal-btn {
    background: #A3362C; color: white; border: none;
    padding: 13px 38px; font-family: "Cinzel", serif; font-size: .72rem;
    letter-spacing: .22em; cursor: none; border-radius: 1px;
    transition: background 0.25s; box-shadow: 0 4px 20px rgba(163,54,44,.3);
    text-transform: uppercase; display: flex; align-items: center; gap: 10px;
  }
  .cal-btn:hover { background: #7e2920; }

  /* Outline chevron SVG — rotates when open */
  .chevron-icon {
    width: 11px; height: 11px; flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .cal-btn.open .chevron-icon { transform: rotate(180deg); }

  .cal-options {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%; transform: translateX(-50%) translateY(6px);
    background: var(--cream);
    border: 1px solid rgba(163,54,44,.2);
    border-radius: 2px;
    box-shadow: 0 -6px 24px rgba(163,54,44,.12);
    overflow: hidden;
    min-width: 210px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .cal-options.open {
    opacity: 1; pointer-events: all;
    transform: translateX(-50%) translateY(0);
  }
  .cal-opt {
    background: transparent; border: none; color: #A3362C;
    padding: 13px 18px;
    font-family: "Cormorant Garamond", serif; font-size: 1rem;
    cursor: none; width: 100%; text-align: left;
    display: flex; align-items: center; gap: 11px;
    transition: background 0.2s;
    border-bottom: 1px solid rgba(163,54,44,.08);
  }
  .cal-opt:last-child { border-bottom: none; }
  .cal-opt:hover { background: rgba(163,54,44,.07); }
  .cal-opt svg { flex-shrink: 0; }

  .lang-link {
    font-family: "Cormorant Garamond", serif; font-style: italic; font-size: .88rem;
    color: #A3362C; cursor: none; letter-spacing: .06em;
    transition: opacity .2s; border: none; background: none;
  }
  .lang-link:hover { opacity: .6; }

  #confetti-canvas { position: fixed; inset: 0; z-index: 200; pointer-events: none; }
</style>
</head>

  const T = {
    en: { addcal:"Add to Calendar", gcal:"Google Calendar", ical:"Apple Calendar", changelang:"Change Language" },
    ko: { addcal:"\uCE98\uB9B0\uB354\uC5D0 \uCD94\uAC00", gcal:"Google Calendar", ical:"Apple Calendar", changelang:"\uC5B8\uC5B4 \uBCC0\uACBD" },
    es: { addcal:"Agregar al Calendario", gcal:"Google Calendar", ical:"Apple Calendar", changelang:"Cambiar Idioma" }
  };

  let currentLang = "en";
  function $(id) { return document.getElementById(id); }

  // Dog cursor — only on real pointer devices, not touch
  const cursor = $("dog-cursor");
  if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
    document.addEventListener("mousemove", e => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top  = e.clientY + "px";
      cursor.style.opacity = "1";
    });
    document.addEventListener("mouseleave", () => cursor.style.opacity = "0");
  }

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
    $(id).classList.remove("hidden");
  }

  function selectLang(lang) {
    currentLang = lang;
    $("inviteImg").src = IMAGES[lang];
    const t = T[lang];
    $("txt-addcal").textContent = t.addcal;
    $("txt-gcal").textContent   = t.gcal;
    $("txt-ical").textContent   = t.ical;
    $("txt-changelang").textContent = t.changelang;
    $("inviteWrap").classList.remove("visible");
    closeCalDropdown();
    $("bottomBar").style.display = "none";
    showScreen("invite-screen");
    setTimeout(() => {
      $("bottomBar").style.display = "flex";
      launchConfetti();
      requestAnimationFrame(() => requestAnimationFrame(() => $("inviteWrap").classList.add("visible")));
    }, 60);
  }

  function closeCalDropdown() {
    $("calOptions").classList.remove("open");
    $("calBtn").classList.remove("open");
  }

  $("calBtn").addEventListener("click", e => {
    e.stopPropagation();
    const isOpen = $("calOptions").classList.contains("open");
    if (isOpen) { closeCalDropdown(); } else {
      $("calOptions").classList.add("open");
      $("calBtn").classList.add("open");
    }
  });
  document.addEventListener("click", () => closeCalDropdown());
  $("calDropdown").addEventListener("click", e => e.stopPropagation());

  // Google Calendar — 5pm to 11pm Toronto local time
  $("btnGcal").addEventListener("click", () => {
    closeCalDropdown();
    const url = "https://calendar.google.com/calendar/render?action=TEMPLATE"
      + "&text=Judy+Yoo+%26+Manuel+Diaz-Granados+Wedding"
      + "&dates=20270821T170000/20270821T230000"
      + "&details=Wedding+Ceremony+%26+Dinner+at+Auberge+du+Pommier%0A4150+Yonge+Street%2C+Toronto%2C+ON+M2P+2C6"
      + "&location=Auberge+du+Pommier%2C+4150+Yonge+Street%2C+Toronto%2C+ON+M2P+2C6"
      + "&ctz=America%2FToronto";
    window.open(url, "_blank");
  });

  // Apple / iCal — 5pm to 11pm local
  $("btnIcal").addEventListener("click", () => {
    closeCalDropdown();
    const ics = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "CALSCALE:GREGORIAN",
      "PRODID:-//Judy & Manuel Wedding//EN",
      "METHOD:PUBLISH",
      "BEGIN:VTIMEZONE",
      "TZID:America/Toronto",
      "BEGIN:STANDARD",
      "DTSTART:19671029T020000",
      "RRULE:FREQ=YEARLY;BYDAY=1SU;BYMONTH=11",
      "TZNAME:EST",
      "TZOFFSETFROM:-0400",
      "TZOFFSETTO:-0500",
      "END:STANDARD",
      "BEGIN:DAYLIGHT",
      "DTSTART:19870405T020000",
      "RRULE:FREQ=YEARLY;BYDAY=2SU;BYMONTH=3",
      "TZNAME:EDT",
      "TZOFFSETFROM:-0500",
      "TZOFFSETTO:-0400",
      "END:DAYLIGHT",
      "END:VTIMEZONE",
      "BEGIN:VEVENT",
      "UID:judyyoo-manueldiazgranados-20270821@aubergedupommier",
      "DTSTAMP:20260304T120000Z",
      "DTSTART;TZID=America/Toronto:20270821T170000",
      "DTEND;TZID=America/Toronto:20270821T230000",
      "SUMMARY:Judy Yoo & Manuel Diaz-Granados' Wedding",
      "DESCRIPTION:Wedding Ceremony & Dinner\nAuberge du Pommier\n4150 Yonge Street\, Toronto\, ON M2P 2C6",
      "LOCATION:Auberge du Pommier\, 4150 Yonge Street\, Toronto\, ON M2P 2C6",
      "STATUS:CONFIRMED",
      "END:VEVENT",
      "END:VCALENDAR"
    ].join("\r\n");

    const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "judy-manuel-wedding.ics";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  $("btnChangeLang").addEventListener("click", () => {
    $("bottomBar").style.display = "none";
    $("inviteWrap").classList.remove("visible");
    closeCalDropdown();
    showScreen("lang-screen");
  });

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => selectLang(btn.dataset.lang));
  });

  function launchConfetti() {
    const canvas = $("confetti-canvas");
    const ctx    = canvas.getContext("2d");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const emojis = ["\uD83C\uDF77","\uD83E\uDD42","\uD83E\uDEA9","\uD83C\uDF38","\uD83D\uDC90","\u2728","\uD83C\uDF3A","\uD83D\uDCAB","\uD83C\uDF8A","\uD83C\uDF80"];
    const particles = Array.from({length: 55}, () => ({
      x: Math.random()*canvas.width, y: -30-Math.random()*100,
      emoji: emojis[Math.floor(Math.random()*emojis.length)],
      size: 16+Math.random()*20, vx: (Math.random()-.5)*5,
      vy: 1.5+Math.random()*4, rot: Math.random()*Math.PI*2,
      rotV: (Math.random()-.5)*0.14
    }));
    const dur = 3200, start = performance.now();
    (function draw(now) {
      const el = now - start;
      if (el > dur) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const fade = Math.max(0, 1-(el/dur)*1.1);
      particles.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.vy+=.07; p.rot+=p.rotV;
        ctx.save(); ctx.globalAlpha=fade; ctx.font=p.size+"px serif";
        ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillText(p.emoji,-p.size/2,p.size/2); ctx.restore();
      });
      requestAnimationFrame(draw);
    })(start);
  }
})();
